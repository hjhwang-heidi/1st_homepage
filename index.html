<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제희의 첫 번째 생일 초대장</title>
    <!-- 구글 폰트: 감성적인 명조체 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Gowun Batang', serif; 
            color: #333; 
            background-color: #fdfaf7; 
            line-height: 1.8;
            word-break: keep-all;
        }

        /* 공통 섹션 스타일 */
        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
        }

        /* 첫 번째 페이지: 메인 (사진 포함) */
        #page1 {
            background-color: #fff;
        }
        .main-title {
            font-size: 1.45rem;
            margin-bottom: 40px;
            color: #8d7b68;
            font-weight: 700;
            line-height: 1.6;
        }
        .baby-photo-container {
            width: 85%;
            max-width: 320px;
            height: 450px;
            overflow: hidden;
            border-radius: 160px 160px 20px 20px; /* 아치형 디자인 */
            box-shadow: 0 15px 35px rgba(141, 123, 104, 0.2);
        }
        .baby-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 사진이 비율에 맞게 꽉 차도록 설정 */
        }

        /* 두 번째 페이지: 안내글 */
        #page2 {
            background-color: #fdfaf7;
        }
        .name-title {
            font-size: 2.8rem;
            letter-spacing: 15px;
            margin-bottom: 40px;
            color: #5d564e;
            padding-left: 15px;
        }
        .name-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 1px;
            background: #d1c7bd;
            margin: 20px auto 0;
        }
        .invitation-text {
            font-size: 1.05rem;
            color: #555;
        }
        .invitation-text p {
            margin-bottom: 8px;
        }

        /* 세 번째 페이지: 가로 영상 */
        #page3 {
            background-color: #fff;
        }
        .video-title {
            font-size: 1.25rem;
            margin-bottom: 35px;
            color: #8d7b68;
            font-weight: 700;
        }
        .video-wrapper {
            width: 100%;
            max-width: 550px;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 가로 영상 16:9 비율 */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 0;
        }
        
        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #aaa;
        }

        /* 페이드인 애니메이션 */
        .fade-in {
            animation: fadeIn 2.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 첫 번째 페이지: 메인 -->
    <section id="page1">
        <div class="main-title fade-in">
            4월 28일<br>
            제희의 첫 번째 생일을<br>
            축하해주세요!
        </div>
        <div class="baby-photo-container fade-in">
            <!-- 업데이트된 사진 경로 -->
            <img src="images/IMG_9710.JPG" alt="제희의 첫 돌 사진">
        </div>
    </section>

    <!-- 두 번째 페이지: 안내글 -->
    <section id="page2">
        <h1 class="name-title">제 희</h1>
        <div class="invitation-text">
            <p>꽃향기 가득한 따스한 봄날,</p>
            <p>우리 제희가 세상에 온 지</p>
            <p>어느덧 일 년이 되었습니다.</p>
            <p>함께해주신 소중한 분들 덕분에</p>
            <p>제희가 건강하게 자랄 수 있었습니다.</p>
            <p>초보 엄마 아빠의 서툰 걸음에도</p>
            <p>늘 곁에서 응원해주신 고마운 분들을 모시고</p>
            <p>작고 소중한 잔치를 열고자 합니다.</p>
            <p>제희의 첫 번째 생일 파티에 오셔서</p>
            <p>밝은 앞날을 함께 축복해 주세요.</p>
        </div>
    </section>

    <!-- 세 번째 페이지: 가로 영상 -->
    <section id="page3">
        <h2 class="video-title">제희의 성장 기록 영상</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <!-- 가로 영상 최적화 및 ID 반영 -->
                <iframe src="https://www.youtube.com/embed/2Pjg7h13z2U?rel=0" 
                        title="제희 성장 영상" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
        <div class="footer">
            2024. 04. 28 <br>
            아빠 엄마 드림
        </div>
    </section>

</body>
</html>
