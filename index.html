<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제희의 첫 번째 생일 초대장</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Gowun Batang', serif; color: #333; background-color: #fdfaf7; line-height: 1.8; word-break: keep-all; }

        section { width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; text-align: center; }

        /* 1페이지: 메인 */
        #page1 { background-color: #fff; }
        .main-title { font-size: 1.4rem; margin-bottom: 40px; color: #8d7b68; font-weight: 700; }
        .baby-photo-container { width: 85%; max-width: 300px; height: 400px; border-radius: 150px 150px 20px 20px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .baby-photo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* 2페이지: 인사말 */
        #page2 { background-color: #fdfaf7; }
        .curved-text-container { width: 280px; height: 100px; margin-bottom: -20px; }
        .curved-text-container text { font-family: 'Dancing Script', cursive; font-size: 24px; fill: #a6937c; }
        .name-title { font-size: 2.8rem; letter-spacing: 15px; margin-bottom: 30px; color: #5d564e; padding-left: 15px; }
        .invitation-text { font-size: 0.95rem; color: #555; line-height: 2.2; }
        .parents-name { margin-top: 30px; font-weight: 700; color: #444; }

        /* 3페이지: 사진첩 (4x4 바둑판) */
        #page3 { background-color: #fff; }
        .gallery-title { font-size: 1.3rem; margin-bottom: 30px; color: #8d7b68; font-weight: 700; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 360px; }
        .gallery-item { width: 100%; aspect-ratio: 1 / 1; background: #eee; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 4페이지: 영상 */
        #page4 { background-color: #fdfaf7; }
        .video-wrapper { width: 100%; max-width: 550px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* 사진 팝업 모달 */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { position: relative; width: 90%; max-width: 500px; display: flex; align-items: center; justify-content: center; }
        .modal-content img { width: 100%; border-radius: 8px; }
        .close-btn { position: absolute; top: -50px; right: 0; color: white; font-size: 35px; cursor: pointer; padding: 10px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; background: none; border: none; padding: 20px; }
        .prev-btn { left: -20px; }
        .next-btn { right: -20px; }

        .footer { margin-top: 40px; font-size: 0.8rem; color: #aaa; }
        .fade-in { animation: fadeIn 2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1페이지 -->
    <section id="page1">
        <div class="main-title fade-in">
            제희의 첫 번째 생일을<br>축하해주세요!
        </div>
        <div class="baby-photo-container fade-in">
            <img src="images/IMG_9710.JPG" alt="메인 사진">
        </div>
    </section>

    <!-- 2페이지 -->
    <section id="page2">
        <div class="curved-text-container">
            <svg viewBox="0 0 300 100">
                <path id="curvePath" d="M 30,90 A 120,90 0 0,1 270,90" fill="transparent" />
                <text><textPath xlink:href="#curvePath" startOffset="50%" text-anchor="middle">Happy 1st birthday</textPath></text>
            </svg>
        </div>
        <h1 class="name-title">제 희</h1>
        <div class="invitation-text">
            <p>2025년 4월 17일</p>
            <p>저희 곁에 찾아온 사랑스러운 제희가</p>
            <p>어느새 사계절을 지나 첫 번째 생일을 맞이했습니다.</p>
            <br>
            <p>가족분들의 따뜻한 사랑 덕분에</p>
            <p>제희가 잘 먹고, 잘 자고, 잘 웃는 아이로</p>
            <p>건강하게 자랄 수 있었습니다.</p>
            <br>
            <p>앞으로도 제희와 함께하는 매 순간이</p>
            <p>빛나는 축복임을 잊지 않고 키워나가겠습니다.</p>
            <br>
            <p>감사드립니다.</p>
            <p class="parents-name">아빠 오제형, 엄마 황희정 올림</p>
        </div>
    </section>

    <!-- 3페이지: 사진첩 -->
    <section id="page3">
        <h2 class="gallery-title">제희의 추억</h2>
        <div class="gallery-grid" id="galleryGrid">
            <!-- 16개의 이미지 칸. 실제 사진 경로로 수정하세요 (예: photo1.jpg ~ photo16.jpg) -->
            <!-- 현재는 테스트를 위해 같은 이미지를 넣었습니다 -->
            <script>
                for(let i=1; i<=16; i++) {
                    document.write(`<div class="gallery-item" onclick="openModal(${i-1})"><img src="images/IMG_9710.JPG"></div>`);
                }
            </script>
        </div>
    </section>

    <!-- 4페이지: 영상 -->
    <section id="page4">
        <h2 class="gallery-title">성장 기록 영상</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/2Pjg7h13z2U?rel=0" allowfullscreen></iframe>
            </div>
        </div>
        <div class="footer">Happy Jehee's 1st Birthday</div>
    </section>

    <!-- 이미지 팝업 모달 -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
            <img id="modalImg" src="" alt="확대 이미지">
            <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <script>
        // 사진 경로 배열 (실제 사진 파일명들로 채워주세요)
        const images = Array(16).fill("images/IMG_9710.JPG"); 
        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            document.getElementById('photoModal').style.display = 'flex';
            document.getElementById('modalImg').src = images[currentIndex];
            document.body.style.overflow = 'hidden'; // 스크롤 방지
        }

        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function changeImage(dir) {
            currentIndex += dir;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            document.getElementById('modalImg').src = images[currentIndex];
        }

        // 스와이프 기능 (모바일용)
        let touchstartX = 0;
        let touchendX = 0;

        const modalImg = document.getElementById('modalImg');
        modalImg.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        modalImg.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) changeImage(1); // 왼쪽으로 밀면 다음
            if (touchendX - touchstartX > 50) changeImage(-1); // 오른쪽으로 밀면 이전
        });
    </script>
</body>
</html>
