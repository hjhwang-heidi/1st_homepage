<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제희의 첫 번째 생일 </title>
    <!-- 구글 폰트 적용 (나눔명조, 고운바탕) -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Gowun Batang', serif; 
            color: #333; 
            background-color: #fdfaf7; 
            line-height: 1.6;
        }

        /* 공통 섹션 스타일 */
        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        /* 첫 번째 페이지: 메인 */
        #page1 {
            background-color: #fff;
        }
        .main-title {
            font-size: 1.4rem;
            margin-bottom: 30px;
            color: #8d7b68;
            font-weight: 700;
        }
        .baby-photo {
            width: 80%;
            max-width: 300px;
            height: 400px;
            background: #eee url('https://via.placeholder.com/300x400') no-repeat center; /* 실제 사진 경로로 수정 */
            background-size: cover;
            border-radius: 150px 150px 0 0; /* 아치형 디자인 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* 두 번째 페이지: 안내글 */
        #page2 {
            background-color: #fdfaf7;
        }
        .name-title {
            font-size: 2.5rem;
            letter-spacing: 10px;
            margin-bottom: 40px;
            color: #5d564e;
            border-bottom: 1px solid #d1c7bd;
            padding-bottom: 10px;
        }
        .invitation-text {
            font-size: 1rem;
            color: #666;
            word-break: keep-all;
        }
        .invitation-text p {
            margin-bottom: 15px;
        }

        /* 세 번째 페이지: 영상 */
        #page3 {
            background-color: #fff;
        }
        .video-title {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #8d7b68;
        }
        .video-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* 애니메이션 효과 */
        .fade-in {
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 첫 번째 페이지 -->
    <section id="page1">
        <div class="main-title fade-in">
            4월 28일<br>
            제희의 첫 번째 생일을<br>
            축하해주세요!
        </div>
        <div class="baby-photo fade-in">
            <!-- <img src="제희사진.jpg" style="width:100%; height:100%; object-fit:cover; border-radius: 150px 150px 0 0;"> -->
        </div>
    </section>

    <!-- 두 번째 페이지 -->
    <section id="page2">
        <h1 class="name-title">제 희</h1>
        <div class="invitation-text">
            <p>따스한 봄볕 아래,</p>
            <p>우리 제희가 세상에 온 지</p>
            <p>어느덧 일 년이 되었습니다.</p>
            <p>초보 엄마 아빠 곁에서</p>
            <p>밝고 건강하게 자라준 제희를 위해</p>
            <p>작은 잔치를 마련했습니다.</p>
            <p>귀한 걸음 하시어</p>
            <p>제희의 첫 번째 걸음마를</p>
            <p>응원해주시고 축복해주세요.</p>
            <p>감사합니다.</p>
        </div>
    </section>

    <!-- 세 번째 페이지 -->
    <section id="page3">
        <h2 class="video-title">제희의 성장 영상</h2>
        <div class="video-container">
            <!-- 유튜브 영상 ID를 입력하세요 (예: dQw4w9WgXcQ) -->
            <iframe src="https://www.youtube.com/embed/2Pjg7h13z2U" 
                    title="YouTube video player" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
        </div>
        <div class="footer">
            2024년 4월 28일 | 제희네 가족 드림
        </div>
    </section>

</body>
</html>
