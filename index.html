<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제희의 첫 번째 생일 초대장</title>

    <!-- ✅ 카카오톡/메신저 공유용 설정 (Vercel 주소로 변경 필요) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="제희의 첫 번째 생일 초대장">
    <meta property="og:description" content="2026년 4월 17일, 제희의 생일을 축하해 주세요!">
    <meta property="og:image" content="https://your-project-name.vercel.app/images/image16.JPG">
    <meta property="og:url" content="https://your-project-name.vercel.app">

    <!-- 구글 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Gowun Batang', serif; color: #333; background-color: #fdfaf7; line-height: 1.8; word-break: keep-all; }

        section { width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }

        /* 1페이지: 메인 */
        #page1 { background-color: #fff; }
        .main-title { font-size: 1.4rem; margin-bottom: 35px; color: #8d7b68; font-weight: 700; line-height: 1.7; }
        .baby-photo-container { width: 85%; max-width: 300px; height: 400px; border-radius: 150px 150px 20px 20px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .baby-photo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* 2페이지: 인사말 - 간격 극최소화 */
        #page2 { background-color: #fdfaf7; }
        .curved-text-container { 
            width: 300px; 
            height: 40px; 
            margin-bottom: -12px; /* 이름과 밀착 */
            z-index: 1;
        }
        .curved-text-container svg { width: 100%; height: 100%; overflow: visible; }
        .curved-text-container text { font-family: 'Dancing Script', cursive; font-size: 26px; fill: #a6937c; }
        
        .name-title { font-size: 2.8rem; letter-spacing: 15px; margin-bottom: 25px; color: #5d564e; padding-left: 15px; line-height: 1.0; }
        .invitation-text { font-size: 0.95rem; color: #555; line-height: 2.2; }
        .parents-name { margin-top: 30px; font-weight: 700; color: #444; }

        /* 3페이지: 사진첩 (지연 로딩 적용) */
        #page3 { background-color: #fff; }
        .gallery-title { font-size: 1.3rem; margin-bottom: 30px; color: #8d7b68; font-weight: 700; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 360px; }
        .gallery-item { width: 100%; aspect-ratio: 1 / 1; background: #f7f7f7; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 4페이지: 영상 */
        #page4 { background-color: #fdfaf7; }
        .video-wrapper { width: 100%; max-width: 550px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* 모달 팝업 */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { position: relative; width: 95%; max-width: 500px; text-align: center; }
        .modal-content img { width: 100%; border-radius: 4px; max-height: 80vh; object-fit: contain; }
        .close-btn { position: absolute; top: -60px; right: 0; color: white; font-size: 45px; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; background: none; border: none; padding: 20px; }
        .prev-btn { left: -30px; }
        .next-btn { right: -30px; }

        .footer { margin-top: 50px; font-size: 0.8rem; color: #aaa; }
        .fade-in { animation: fadeIn 2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1페이지: 메인 -->
    <section id="page1">
        <div class="main-title fade-in">
            2026년 4월 17일<br>
            제희의 첫 번째 생일을<br>
            축하해주세요!
        </div>
        <div class="baby-photo-container fade-in">
            <!-- 메인 사진 변경: image16.JPG -->
            <img src="images/image16.JPG" alt="메인 이미지">
        </div>
    </section>

    <!-- 2페이지: 인사말 -->
    <section id="page2">
        <div class="curved-text-container">
            <svg viewBox="0 0 320 40">
                <path id="curvePath" d="M 40,38 A 120,40 0 0,1 280,38" fill="transparent" />
                <text>
                    <textPath xlink:href="#curvePath" startOffset="50%" text-anchor="middle">
                        Happy 1st birthday
                    </textPath>
                </text>
            </svg>
        </div>
        <h1 class="name-title">제 희</h1>
        <div class="invitation-text">
            <p>2025년 4월 17일</p>
            <p>저희 곁에 찾아온 사랑스러운 제희가</p>
            <p>어느새 사계절을 지나 첫 번째 생일을 맞이했습니다.</p>
            <br>
            <p>가족분들의 따뜻한 사랑 덕분에</p>
            <p>제희가 잘 먹고, 잘 자고, 잘 웃는 아이로</p>
            <p>건강하게 자랄 수 있었습니다.</p>
            <br>
            <p>앞으로도 제희와 함께하는 매 순간이</p>
            <p>빛나는 축복임을 잊지 않고 키워나가겠습니다.</p>
            <br>
            <p>감사드립니다.</p>
            <p class="parents-name">아빠 오제형, 엄마 황희정 올림</p>
        </div>
    </section>

    <!-- 3페이지: 사진첩 -->
    <section id="page3">
        <h2 class="gallery-title">제희의 추억</h2>
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <!-- 4페이지: 영상 -->
    <section id="page4">
        <h2 class="gallery-title">성장 기록 영상</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/2Pjg7h13z2U?rel=0" allowfullscreen></iframe>
            </div>
        </div>
        <div class="footer">Happy Jehee's 1st Birthday</div>
    </section>

    <!-- 모달 -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
            <img id="modalImg" src="">
            <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <script>
        // 이미지 경로 (.JPG 대문자)
        const images = [];
        for (let i = 1; i <= 16; i++) {
            images.push(`images/image${i}.JPG`);
        }

        const galleryGrid = document.getElementById('galleryGrid');
        images.forEach((src, index) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.onclick = () => openModal(index);
            // ✅ loading="lazy" 추가하여 썸네일 로딩 속도 최적화
            item.innerHTML = `<img src="${src}" loading="lazy" onerror="this.style.display='none'">`;
            galleryGrid.appendChild(item);
        });

        let currentIndex = 0;
        function openModal(index) {
            currentIndex = index;
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = 'flex';
            modalImg.src = images[currentIndex];
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        function changeImage(dir) {
            currentIndex += dir;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            document.getElementById('modalImg').src = images[currentIndex];
        }

        let touchstartX = 0;
        const modalImg = document.getElementById('modalImg');
        modalImg.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        modalImg.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) changeImage(1);
            if (touchendX - touchstartX > 50) changeImage(-1);
        });
    </script>
</body>
</html>
